<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <!-- 定义画笔风格的滤镜效果 -->
    <filter id="brush" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    
    <!-- 渐变效果增加立体感 -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景（透明，实际使用时可根据需要调整） -->
  
  <!-- 主图形组：创可贴轮廓 + 聊天气泡尾巴 -->
  <g transform="translate(40, 40)">
    <!-- 聊天气泡小尾巴（右上角） -->
    <path d="M 105 15 Q 115 5, 125 0 Q 120 10, 115 18 Z" 
          fill="#f97316" opacity="0.9"/>
    
    <!-- 创可贴主体轮廓 - 流畅画笔风格 -->
    <path d="M 20 30 
             Q 20 15, 35 15 
             L 95 15 
             Q 110 15, 110 30 
             L 110 90 
             Q 110 105, 95 105 
             L 35 105 
             Q 20 105, 20 90 
             Z" 
          fill="none" 
          stroke="url(#orangeGrad)" 
          stroke-width="4.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#brush)"
          opacity="0.95"/>
    
    <!-- 内部装饰线条 - 模拟创可贴的透气孔纹理 -->
    <line x1="30" y1="45" x2="45" y2="45" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="60" x2="40" y2="60" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="75" x2="45" y2="75" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- LB 连写字母 - 动感抽象设计 -->
    <!-- L 的流畅笔画 -->
    <path d="M 48 48 
             Q 48 75, 48 82 
             Q 48 88, 55 88 
             L 72 88" 
          fill="none" 
          stroke="#f97316" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#brush)"/>
    
    <!-- B 的流畅笔画 - 与 L 连笔 -->
    <path d="M 72 48 
             L 72 88 
             M 72 48 
             Q 88 48, 88 58 
             Q 88 68, 72 68 
             M 72 68 
             Q 92 68, 92 78 
             Q 92 88, 72 88" 
          fill="none" 
          stroke="#f97316" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#brush)"/>
          
    <!-- 连笔处的动感点缀 - 小圆点 -->
    <circle cx="72" cy="68" r="3.5" fill="#f97316" opacity="0.8"/>
  </g>
  
  <!-- 文字部分 -->
  <g transform="translate(175, 55)">
    <!-- 主标题 LiliBlog -->
    <text x="0" y="50" 
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif" 
          font-size="52" 
          font-weight="700" 
          fill="#f97316" 
          letter-spacing="-1"
          style="font-feature-settings: 'kern' 1;">
      Lili<tspan fill="#6b7280">Blog</tspan>
    </text>
    
    <!-- 副标题 lilicould.cn -->
    <text x="0" y="85" 
          font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" 
          font-size="16" 
          font-weight="400" 
          fill="#9ca3af" 
          letter-spacing="2">
      lilicould.cn
    </text>
    
    <!-- 装饰下划线 - 呼应画笔风格 -->
    <path d="M 0 95 Q 60 98, 120 95" 
          stroke="#f97316" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          fill="none"
          opacity="0.6"/>
  </g>
</svg>